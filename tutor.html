<!DOCTYPE html>
<html lang="en">
<head><title>Tutor Portal</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head>
<body>
    <div class="modal-overlay" id="passwordModal"><div class="momo-box"><h2>🔒 Security Alert</h2><p>Please change your temporary password.</p><input type="password" id="new_tutor_pass" placeholder="New Password"><button class="momo-btn" onclick="updatePassword()">Update</button></div></div>
    
    <div class="container">
        <div class="glass-panel" style="display:flex; justify-content:space-between; align-items:center;">
            <div><h2 id="tutor-title" style="color: #ff9f43; margin-bottom:5px;">Tutor Dashboard</h2><span id="tutor-group" class="ad-badge" style="background:#1dd1a1; color:#000;">Loading...</span></div>
            <button class="btn btn-danger" style="width:auto;" onclick="sessionStorage.clear(); window.location.href='index.html'">Logout</button>
        </div>

        <div class="grid">
            <div class="glass-panel">
                <h3 style="color:#1dd1a1;">📝 Create Assessment</h3>
                <select id="a_course"><option value="">Loading Courses...</option></select>
                <select id="a_group" class="hidden"><option value="GLOBAL">🌐 Global (All Groups)</option></select>
                <select id="a_type" onchange="toggleAssType()"><option value="Exam">Exam (MCQ)</option><option value="IA">IA (Continuous)</option><option value="Assignment">Assignment (File Upload)</option></select>
                <input type="text" id="a_title" placeholder="Title (e.g. Midterm IA)">
                <input type="number" id="a_days" placeholder="Valid for how many days? (e.g. 7)">
                <input type="number" id="a_duration" placeholder="Duration in Mins (Exams/IAs)">
                <textarea id="a_desc" class="hidden" placeholder="Assignment Instructions"></textarea>
                <button class="btn btn-blue" onclick="createAssessment()">Create Assessment</button>
            </div>
            <div class="glass-panel">
                <h3 style="color:#ffb142;">➕ Add Question to Exam/IA</h3>
                <select id="q_exam"><option value="">Loading Exams...</option></select>
                <textarea id="q_text" placeholder="Type the question here..."></textarea>
                <div style="display: flex; gap: 10px;"><input type="text" id="q_a" placeholder="Option A"><input type="text" id="q_b" placeholder="Option B"></div>
                <div style="display: flex; gap: 10px;"><input type="text" id="q_c" placeholder="Option C"><input type="text" id="q_d" placeholder="Option D"></div>
                <select id="q_ans"><option value="">Correct Answer</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
                <button class="btn" style="background:#ffb142; color:#000;" onclick="addQuestion()">Add Question</button>
            </div>
        </div>

        <div class="grid">
            <div class="glass-panel">
                <h3>📤 Upload Study Materials</h3>
                <select id="tutor-courses"><option value="">Loading Courses...</option></select>
                <input type="text" id="mat_title" placeholder="Material Title"><input type="url" id="mat_link" placeholder="Download Link (Google Drive)">
                <button class="btn" style="background:#ff9f43;" onclick="uploadMaterial()">Upload File</button>
            </div>
            <div class="glass-panel">
                <h3 style="color:#ff6b6b;">🗑️ Manage Your Uploads & Tests</h3>
                <div style="max-height: 200px; overflow-y: auto;"><table style="margin-top:0;"><tbody id="tutor-manage-list"></tbody></table></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let tutor = JSON.parse(sessionStorage.getItem('tutor')); if(!tutor) window.location.href = 'index.html';
        window.onload = async () => {
            if(tutor.is_first_login) document.getElementById('passwordModal').classList.add('active');
            document.getElementById('tutor-title').innerText = `${tutor.name}`;
            
            // IF GLOBAL TUTOR -> SHOW TARGET DROPDOWN
            if(!tutor.group_id) {
                document.getElementById('tutor-group').innerText = "Global Tutor";
                document.getElementById('a_group').classList.remove('hidden');
                const { data: groups } = await supabaseClient.from('study_groups').select('*').eq('school_id', tutor.school_id);
                if(groups) groups.forEach(g => document.getElementById('a_group').innerHTML += `<option value="${g.id}">🎯 Target: ${g.group_name}</option>`);
            } else {
                const { data: grp } = await supabaseClient.from('study_groups').select('group_name').eq('id', tutor.group_id).single(); 
                if(grp) document.getElementById('tutor-group').innerText = `Group: ${grp.group_name}`;
            }
            
            const { data: c } = await supabaseClient.from('courses').select('*').eq('school_id', tutor.school_id);
            if(c) c.forEach(x => { document.getElementById('tutor-courses').innerHTML += `<option value="${x.id}">${x.course_code}</option>`; document.getElementById('a_course').innerHTML += `<option value="${x.id}">${x.course_code}</option>`; });
            
            const mngList = document.getElementById('tutor-manage-list');
            let qQuery = supabaseClient.from('exams').select('id, title, exam_type');
            if(tutor.group_id) qQuery = qQuery.eq('group_id', tutor.group_id);
            const { data: exams } = await qQuery;
            if(exams) exams.forEach(e => { document.getElementById('q_exam').innerHTML += `<option value="${e.id}">[${e.exam_type}] ${e.title}</option>`; mngList.innerHTML += `<tr><td><strong>[${e.exam_type}]</strong> ${e.title}</td><td><button class="btn btn-danger" style="padding:5px;" onclick="deleteItem('exams', ${e.id})">🗑️</button></td></tr>`; });
        };
        async function updatePassword() { const p = document.getElementById('new_tutor_pass').value; if(p.length < 5) return; await supabaseClient.from('tutors').update({ password: p, is_first_login: false }).eq('id', tutor.id); tutor.is_first_login = false; sessionStorage.setItem('tutor', JSON.stringify(tutor)); document.getElementById('passwordModal').classList.remove('active'); }
        async function uploadMaterial() { await supabaseClient.from('materials').insert([{ course_id: document.getElementById('tutor-courses').value, tutor_id: tutor.id, title: document.getElementById('mat_title').value, file_link: document.getElementById('mat_link').value }]); location.reload(); }
        async function deleteItem(table, id) { if(confirm("Delete this permanently?")) { await supabaseClient.from(table).delete().eq('id', id); location.reload(); } }
        function toggleAssType() { const t = document.getElementById('a_type').value; document.getElementById('a_duration').classList.toggle('hidden', t==='Assignment'); document.getElementById('a_desc').classList.toggle('hidden', t!=='Assignment'); }
        
        async function createAssessment() { 
            const t = document.getElementById('a_type').value; 
            const d = parseInt(document.getElementById('a_days').value) || 30; let exp = new Date(); exp.setDate(exp.getDate() + d);
            const gTarget = tutor.group_id ? tutor.group_id : (document.getElementById('a_group').value === "GLOBAL" ? null : document.getElementById('a_group').value);
            if(t === 'Assignment') { await supabaseClient.from('assignments').insert([{ course_id: document.getElementById('a_course').value, title: document.getElementById('a_title').value, description: document.getElementById('a_desc').value, expires_at: exp.toISOString(), group_id: gTarget }]); } 
            else { await supabaseClient.from('exams').insert([{ course_id: document.getElementById('a_course').value, title: document.getElementById('a_title').value, duration_minutes: document.getElementById('a_duration').value, exam_type: t, expires_at: exp.toISOString(), group_id: gTarget }]); } 
            alert(`Created!`); location.reload(); 
        }
        async function addQuestion() { await supabaseClient.from('questions').insert([{ exam_id: document.getElementById('q_exam').value, type: 'mcq', question_text: document.getElementById('q_text').value, option_a: document.getElementById('q_a').value, option_b: document.getElementById('q_b').value, option_c: document.getElementById('q_c').value, option_d: document.getElementById('q_d').value, correct_answer: document.getElementById('q_ans').value }]); alert("Added!"); document.getElementById('q_text').value = ''; }
    </script>
</body>
</html>
