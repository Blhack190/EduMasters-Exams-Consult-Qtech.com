<!DOCTYPE html>
<html lang="en">
<head><title>Exam Environment</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head>
<body style="display:flex; justify-content:center; align-items:center;">
    <div class="glass-panel" style="width: 100%; max-width: 800px;">
        <div style="display:flex; justify-content:space-between; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; margin-bottom: 20px;">
            <h3 id="q-counter">Initializing...</h3><h2 id="timer" style="color: #1dd1a1;">00:00</h2>
        </div>
        <h2 id="q-text" style="margin-bottom: 25px; line-height: 1.5;">Please wait...</h2>
        <div id="options"></div>
        <button id="next-btn" class="btn hidden" style="margin-top: 25px;">Next Question</button>
    </div>

    <script src="config.js"></script>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('visibilitychange', () => { if(document.hidden) submitExam(); }); 

        const student = JSON.parse(sessionStorage.getItem('student'));
        const activeExam = JSON.parse(sessionStorage.getItem('currentExam'));
        if(!student || !activeExam) window.location.href = 'student.html';

        let questions = [], currentIdx = 0, score = 0, timeRemaining = activeExam.duration * 60;
        
        window.onload = async () => {
            const { data } = await supabaseClient.from('questions').select('*').eq('exam_id', activeExam.id);
            questions = data || [];
            if(questions.length === 0) { alert("No questions found."); window.location.href = 'student.html'; return; }
            setInterval(updateTimer, 1000); renderQuestion();
        };

        function updateTimer() {
            timeRemaining--;
            let m = Math.floor(timeRemaining / 60), s = timeRemaining % 60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeRemaining <= 0) submitExam();
        }

        function renderQuestion() {
            if(currentIdx >= questions.length) return submitExam();
            const q = questions[currentIdx];
            document.getElementById('q-counter').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
            document.getElementById('q-text').innerText = q.question_text;
            document.getElementById('options').innerHTML = ['A','B','C','D'].map(opt => `<label style="display:block; background:rgba(0,0,0,0.3); padding:18px; border-radius:10px; margin-bottom:12px; cursor:pointer; border: 1px solid rgba(255,255,255,0.1);"><input type="radio" name="ans" value="${opt}"> ${opt}. ${q['option_'+opt.toLowerCase()]}</label>`).join('');
            
            const btn = document.getElementById('next-btn'); btn.classList.remove('hidden');
            btn.innerText = currentIdx === questions.length - 1 ? "Submit & Auto-Grade" : "Next Question";
            btn.onclick = () => {
                const sel = document.querySelector('input[name="ans"]:checked');
                if(!sel) return alert("Select an answer");
                if(sel.value === q.correct_answer) score++;
                currentIdx++; renderQuestion();
            };
        }

        async function submitExam() {
            document.body.innerHTML = '<h1 style="color:white; text-align:center; margin-top:40vh;">Grading Submission...</h1>';
            const ugGrading = calculateUGGrade(score, questions.length);
            await supabaseClient.from('submissions').insert([{ exam_id: activeExam.id, student_id: student.id, score: score, max_score: questions.length, grade: ugGrading.grade, gpa_points: ugGrading.points }]);
            sessionStorage.removeItem('currentExam'); window.location.href = 'student.html';
        }
    </script>
</body>
</html>
