<!DOCTYPE html>
<html lang="en">
<head>
    <title>Secure Exam Environment - EduMasters</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // DISABLE BACK BUTTON
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); };
    </script>
</head>
<body style="display:flex; justify-content:center; align-items:center; background: #0f2027;">

    <!-- 🚨 ANTI-SCREENSHOT SECURITY BLANKET 🚨 -->
    <div id="security-blanket" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:99999; color:#ff6b6b; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px;">
        <h1 style="font-size: 3rem;">🚨 SECURITY LOCKDOWN 🚨</h1>
        <p style="font-size: 1.2rem; color: #fff; margin-top:10px;">Screen capturing or leaving the exam window is strictly prohibited.<br>Your exam is being automatically submitted.</p>
    </div>

    <!-- 📷 LIVE WEBCAM PROCTORING -->
    <div id="webcam-container" style="position:fixed; bottom:20px; left:20px; width:120px; height:120px; border-radius:50%; overflow:hidden; border:4px solid #1dd1a1; z-index:9000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); display: none;">
        <video id="student-cam" autoplay playsinline style="width:100%; height:100%; object-fit:cover; transform: scaleX(-1);"></video>
    </div>

    <!-- EXAM UI -->
    <div class="glass-panel" id="exam-ui" style="width: 100%; max-width: 800px; z-index: 100; display: none;">
        <div style="display:flex; justify-content:space-between; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; margin-bottom: 20px;">
            <h3 id="q-counter" style="color: #ccc;">Initializing...</h3>
            <h2 id="timer" style="color: #1dd1a1; font-family: monospace; font-size: 2rem; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 8px;">00:00</h2>
        </div>
        <h2 id="q-text" style="margin-bottom: 25px; line-height: 1.5; font-size: 1.3rem;">Please wait...</h2>
        <div id="options"></div>
        <button id="next-btn" class="btn hidden" style="margin-top: 25px; font-size: 1.1rem; padding: 15px;">Next Question</button>
    </div>

    <div id="camera-warning" style="text-align: center; color: #fff;">
        <h2>📷 Requesting Camera Access...</h2>
        <p>This exam is proctored. You must allow camera access to begin.</p>
    </div>

    <script src="config.js"></script>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault()); // No right click
        
        let examSubmitted = false;

        // 🚨 SCREENSHOT & TAB-SWITCH DETECTOR 🚨
        // When the window loses focus (like pulling down the menu to screenshot, or switching tabs), it blacks out the screen and submits!
        window.addEventListener('blur', forceSubmitSecurity);
        document.addEventListener('visibilitychange', () => { if(document.hidden) forceSubmitSecurity(); });

        function forceSubmitSecurity() {
            if(examSubmitted) return;
            examSubmitted = true;
            document.getElementById('security-blanket').style.display = 'flex'; // Turn screen PITCH BLACK
            
            // Stop the camera
            const stream = document.getElementById('student-cam').srcObject;
            if(stream) stream.getTracks().forEach(track => track.stop());

            setTimeout(() => { submitExam(); }, 2000); // Give it 2 seconds to show the warning, then submit
        }

        const student = JSON.parse(sessionStorage.getItem('student'));
        const activeExam = JSON.parse(sessionStorage.getItem('currentExam'));
        if(!student || !activeExam) window.location.href = 'student.html';

        let questions = [], currentIdx = 0, score = 0, timeRemaining = activeExam.duration * 60;
        let timerInterval;
        
        window.onload = async () => {
            // 1. CHECK IF ALREADY TAKEN
            const { data: subCheck } = await supabaseClient.from('submissions').select('id').eq('exam_id', activeExam.id).eq('student_id', student.id).single();
            if(subCheck) { alert("Exam already completed."); window.location.href = 'student.html'; return; }

            // 2. REQUEST CAMERA PERMISSION (PROCTORING)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('student-cam').srcObject = stream;
                document.getElementById('webcam-container').style.display = 'block';
                document.getElementById('camera-warning').style.display = 'none';
                document.getElementById('exam-ui').style.display = 'block';
                
                startExamLogic(); // Camera approved, start exam!
            } catch (err) {
                alert("🛑 Camera access denied. You cannot take this secure exam without video proctoring.");
                window.location.href = 'student.html';
            }
        };

        async function startExamLogic() {
            const { data } = await supabaseClient.from('questions').select('*').eq('exam_id', activeExam.id);
            questions = data || [];
            if(questions.length === 0) { alert("No questions found."); window.location.href = 'student.html'; return; }
            timerInterval = setInterval(updateTimer, 1000); 
            renderQuestion();
        }

        function updateTimer() {
            if(examSubmitted) return;
            timeRemaining--;
            let m = Math.floor(timeRemaining / 60), s = timeRemaining % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(timeRemaining < 300) { document.getElementById('timer').style.color = '#ff6b6b'; }
            if(timeRemaining <= 0) {
                clearInterval(timerInterval);
                alert("⏳ Time is up!");
                examSubmitted = true;
                submitExam();
            }
        }

        function renderQuestion() {
            if(currentIdx >= questions.length) { examSubmitted = true; submitExam(); return; }
            const q = questions[currentIdx];
            document.getElementById('q-counter').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
            document.getElementById('q-text').innerText = q.question_text;
            
            document.getElementById('options').innerHTML = ['A','B','C','D'].map(opt => `
                <label style="display:flex; align-items:center; background:rgba(0,0,0,0.3); padding:18px; border-radius:10px; margin-bottom:12px; cursor:pointer; border: 1px solid rgba(255,255,255,0.1);">
                    <input type="radio" name="ans" value="${opt}" style="transform: scale(1.5); margin-right: 15px;"> 
                    <span><strong style="color:#ffb142;">${opt}.</strong> ${q['option_'+opt.toLowerCase()]}</span>
                </label>`).join('');
            
            const btn = document.getElementById('next-btn'); btn.classList.remove('hidden');
            btn.innerText = currentIdx === questions.length - 1 ? "Submit Exam" : "Next Question";
            btn.onclick = () => {
                const sel = document.querySelector('input[name="ans"]:checked');
                if(!sel) return alert("Select an answer to continue.");
                if(sel.value === q.correct_answer) score++;
                currentIdx++; renderQuestion();
            };
        }

        async function submitExam() {
            window.onblur = null; // Remove security listeners so it doesn't loop
            document.removeEventListener('visibilitychange', forceSubmitSecurity);
            
            document.body.innerHTML = `<div style="text-align:center; margin-top:40vh;"><h1 style="color:#1dd1a1;">Grading Submission...</h1><p style="color:#fff;">Please wait...</p></div>`;
            const ugGrading = calculateUGGrade(score, questions.length);

            await supabaseClient.from('submissions').insert([{ 
                exam_id: activeExam.id, student_id: student.id, 
                score: score, max_score: questions.length, 
                grade: ugGrading.grade, gpa_points: ugGrading.points 
            }]);

            // Turn off camera light
            const stream = document.getElementById('student-cam').srcObject;
            if(stream) stream.getTracks().forEach(track => track.stop());

            sessionStorage.removeItem('currentExam'); window.location.href = 'student.html';
        }
    </script>
</body>
</html>
